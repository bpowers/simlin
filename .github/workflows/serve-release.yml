name: Serve npm Release

on:
  push:
    tags:
      - 'serve-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          CARGO_VERSION=$(grep '^version = ' src/simlin-serve/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"

          if [[ "$GITHUB_REF" == refs/tags/serve-v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#serve-v}"
            echo "Tag version: $TAG_VERSION"
            if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
              exit 1
            fi
          fi

          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: serve-linux-x64
            binary: simlin-serve
            use-zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: serve-linux-arm64
            binary: simlin-serve
            use-zigbuild: true
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: serve-win32-x64
            binary: simlin-serve.exe
            use-zigbuild: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: serve-darwin-arm64
            binary: simlin-serve
            use-zigbuild: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-serve-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-serve-${{ matrix.os }}-${{ matrix.target }}-

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded SPA
        working-directory: src/simlin-serve/web
        run: pnpm build

      - name: Install Zig
        if: matrix.use-zigbuild
        uses: mlugg/setup-zig@v2
        with:
          # Keep in sync with src/simlin-serve/Dockerfile.cross
          version: '0.15.2'

      - name: Install cargo-zigbuild
        if: matrix.use-zigbuild
        run: cargo install --locked cargo-zigbuild@0.22.1

      - name: Build (zigbuild)
        if: matrix.use-zigbuild
        run: cargo zigbuild -p simlin-serve --locked --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use-zigbuild }}
        run: cargo build -p simlin-serve --locked --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 1

  publish-platform:
    name: Publish platform packages
    needs: [validate, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/serve-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Intentionally omit registry-url: it injects a token-based .npmrc that
      # conflicts with npm's OIDC provenance flow.  Trusted publishing handles auth.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare platform packages
        working-directory: src/simlin-serve
        run: |
          bash build-npm-packages.sh

          cp ../../artifacts/serve-linux-x64/simlin-serve npm/@simlin/serve-linux-x64/bin/
          cp ../../artifacts/serve-linux-arm64/simlin-serve npm/@simlin/serve-linux-arm64/bin/
          cp ../../artifacts/serve-win32-x64/simlin-serve.exe npm/@simlin/serve-win32-x64/bin/
          cp ../../artifacts/serve-darwin-arm64/simlin-serve npm/@simlin/serve-darwin-arm64/bin/

          chmod +x npm/@simlin/serve-linux-x64/bin/simlin-serve
          chmod +x npm/@simlin/serve-linux-arm64/bin/simlin-serve
          chmod +x npm/@simlin/serve-darwin-arm64/bin/simlin-serve

      - name: Publish @simlin/serve-linux-x64
        working-directory: src/simlin-serve/npm/@simlin/serve-linux-x64
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@simlin/serve-linux-x64@$VERSION" version > /dev/null 2>&1; then
            echo "Already published @simlin/serve-linux-x64@$VERSION, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish @simlin/serve-linux-arm64
        working-directory: src/simlin-serve/npm/@simlin/serve-linux-arm64
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@simlin/serve-linux-arm64@$VERSION" version > /dev/null 2>&1; then
            echo "Already published @simlin/serve-linux-arm64@$VERSION, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish @simlin/serve-win32-x64
        working-directory: src/simlin-serve/npm/@simlin/serve-win32-x64
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@simlin/serve-win32-x64@$VERSION" version > /dev/null 2>&1; then
            echo "Already published @simlin/serve-win32-x64@$VERSION, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish @simlin/serve-darwin-arm64
        working-directory: src/simlin-serve/npm/@simlin/serve-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@simlin/serve-darwin-arm64@$VERSION" version > /dev/null 2>&1; then
            echo "Already published @simlin/serve-darwin-arm64@$VERSION, skipping"
          else
            npm publish --provenance --access public
          fi

  publish-wrapper:
    name: Publish @simlin/serve
    needs: [validate, publish-platform]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/serve-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Intentionally omit registry-url: trusted publishing handles auth (see publish-platform)
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update wrapper version
        working-directory: src/simlin-serve
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies = (
              .optionalDependencies | to_entries | map(.value = $v) | from_entries
            )
          ' package.json > package.json.tmp && mv package.json.tmp package.json

          echo "Updated wrapper package.json:"
          cat package.json

      - name: Publish @simlin/serve
        working-directory: src/simlin-serve
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@simlin/serve@$VERSION" version > /dev/null 2>&1; then
            echo "Already published @simlin/serve@$VERSION, skipping"
          else
            npm publish --provenance --access public
          fi
