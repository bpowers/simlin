---
name: CI
"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-build-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ matrix.os }}-

      - name: Compile
        run: cargo build --workspace --verbose

      - name: Compile tests
        run: cargo test --workspace --no-run

      # 3-minute wall-clock cap on `cargo test` (post-compile).  CI
      # baseline on ubuntu-latest is ~60s; the cap is a ~3x safety
      # rail against the kind of regression that made PR #461's job
      # hit GitHub's 60-minute per-job cap (one test binary there
      # took 44 minutes).  Uses the step-level `timeout-minutes`
      # field rather than coreutils `timeout(1)` so we do not need
      # to special-case macos-latest (which has no `timeout` on
      # PATH).  Raise in lockstep with scripts/pre-commit if the
      # suite legitimately grows past it.  See docs/dev/rust.md
      # for per-test budget guidance.
      - name: Test
        timeout-minutes: 3
        run: cargo test --workspace

  rust:
    name: Lint and format Rust
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-lint-

      - name: Check formatting
        run: cargo fmt -- --check --color=auto

      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-coverage-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      # 90-minute outer cap on tarpaulin. Baseline pre-simlin-serve was
      # ~23 min; the simlin-serve test suite (filesystem watcher with
      # real debounce waits, MCP duplex pairs, end-to-end save/HTTP
      # round-trips) tipped the wall-clock past the original 45-minute
      # cap, so the whole job timed out without producing coverage XML.
      # Tarpaulin still self-polices per-test at 60s, so this outer cap
      # is a backstop against a runaway test rather than the primary
      # budget. If runtime keeps growing, the next move is `--engine
      # llvm` for source-based coverage at native test speed.
      - name: Run cargo-tarpaulin
        timeout-minutes: 90
        run: cargo tarpaulin --out Xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-wasm-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install jupyterlab

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build the Typescript project
        run: DISABLE_WASM_OPT=1 pnpm build

      - name: Run TypeScript tests
        run: pnpm test

      # The production deploy is a local command with no CI gate, so
      # without this step a regression in the deploy assembly (build
      # outputs landing at the wrong path, hashed bundle not
      # referenced from index.html, web component bundle missing,
      # etc.) only surfaces during the actual `gcloud app deploy`.
      # This re-runs the deploy:assemble step against the existing
      # build, asserts the expected artifacts, and runs deploy:clean
      # so the workspace is restored before any subsequent steps.
      - name: Verify deploy build artifacts
        run: |
          pnpm --filter @simlin/app run deploy:assemble
          bash scripts/verify-deploy-build.sh
          pnpm --filter @simlin/app run deploy:clean
          # After deploy:clean the working tree should be clean. A
          # non-empty `git status` here means deploy:clean is missing
          # a path the build wrote into public/.
          status=$(git status --porcelain)
          if [ -n "$status" ]; then
            echo "ERROR: deploy:clean left the working tree dirty:" >&2
            echo "$status" >&2
            exit 1
          fi

  pysimlin:
    name: pysimlin type check and tests
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-pysimlin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-pysimlin-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build libsimlin
        run: cargo build --release --manifest-path src/libsimlin/Cargo.toml

      - name: Install pysimlin with dev dependencies
        working-directory: src/pysimlin
        run: |
          uv sync --extra dev
          uv pip install setuptools
          uv run python setup.py build_ext --inplace 2>/dev/null || true

      - name: Type check with mypy
        working-directory: src/pysimlin
        run: uv run mypy simlin/

      - name: Run tests
        working-directory: src/pysimlin
        run: uv run pytest -q --no-cov tests/

  policy:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check dependency policy
        run: python3 scripts/check-deps.py

      - name: Check documentation links
        run: python3 scripts/check-docs.py

      - name: Run project lint rules
        run: bash scripts/lint-project.sh

  serve-smoke:
    name: simlin-serve smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 30-minute cap. Once the cargo cache is warm a serve-smoke run
    # completes in under 10 minutes on every platform (macos-latest is
    # the slowest at ~8 min, ubuntu and windows ~5 min). The cold-cache
    # path on Windows is the binding constraint: actions/cache@v4 only
    # saves on job success by default, so a series of failing Windows
    # runs leaves the cache unwarmed indefinitely, and a from-scratch
    # MSVC build of simlin-engine + simlin-serve + their transitive deps
    # takes 18-22 minutes. The previous 15-minute cap was tight for
    # warm-cache macOS and impossible for cold-cache Windows. Once the
    # Windows cache warms (after the first green run), a 15-minute cap
    # would be reasonable again — the headroom here is for the
    # bootstrapping case and to absorb the macos-latest p99.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the @simlin/serve npm matrix shipped from
        # serve-release.yml (darwin-arm64, linux-x64, win32-x64) so
        # CI proves end-to-end behaviour on every platform we publish
        # binaries for. linux-arm64 isn't a GitHub-hosted runner
        # option; we cover that target via cross-compilation and
        # rely on linux-x64 for runtime smoke coverage.
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-serve-smoke-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-serve-smoke-${{ matrix.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # `vite build` only builds the @simlin/serve-web package; it does
      # NOT build its workspace dependencies. The pnpm `...` filter
      # selects serve-web AND its transitive deps (@simlin/core,
      # @simlin/engine, @simlin/diagram) in topological order so each
      # one's `lib/`/`lib.browser/`/`dist/` output exists before vite
      # tries to resolve them. DISABLE_WASM_OPT=1 skips the
      # multi-minute wasm-opt pass on the engine package — release-
      # quality WASM is irrelevant for a smoke test of the serve
      # binary.
      - name: Build embedded SPA (with workspace deps)
        env:
          DISABLE_WASM_OPT: "1"
        run: pnpm --filter "@simlin/serve-web..." run build

      # SIMLIN_SERVE_BUILD_WEB=1 is set as defense-in-depth: the
      # "Build embedded SPA" step above already populates web/dist/,
      # so build.rs has nothing new to do, but the explicit env var
      # guards against a future refactor that drops the explicit
      # frontend step without noticing the embed went stale.
      - name: Build simlin-serve binary
        env:
          SIMLIN_SERVE_BUILD_WEB: "1"
        run: cargo build -p simlin-serve --release

      # The smoke test lives in the consolidated `integration` harness;
      # `smoke::` filters to just its tests (all `#[ignore]`d, hence
      # `--ignored`). The run command is quoted because a plain YAML scalar
      # ending in `:` parses as a mapping key, which made the whole workflow
      # file invalid (every CI run since failed at startup with zero jobs).
      - name: Run smoke test
        run: 'cargo test -p simlin-serve --release --test integration -- --ignored --nocapture smoke::'
