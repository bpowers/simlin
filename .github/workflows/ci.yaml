---
name: CI
"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-build-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ matrix.os }}-

      - name: Compile
        run: cargo build --workspace --verbose

      - name: Compile tests
        run: cargo test --workspace --no-run

      # 3-minute wall-clock cap on `cargo test` (post-compile).  CI
      # baseline on ubuntu-latest is ~60s; the cap is a ~3x safety
      # rail against the kind of regression that made PR #461's job
      # hit GitHub's 60-minute per-job cap (one test binary there
      # took 44 minutes).  Uses the step-level `timeout-minutes`
      # field rather than coreutils `timeout(1)` so we do not need
      # to special-case macos-latest (which has no `timeout` on
      # PATH).  Raise in lockstep with scripts/pre-commit if the
      # suite legitimately grows past it.  See docs/dev/rust.md
      # for per-test budget guidance.
      - name: Test
        timeout-minutes: 3
        run: cargo test --workspace

  rust:
    name: Lint and format Rust
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-lint-

      - name: Check formatting
        run: cargo fmt -- --check --color=auto

      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-coverage-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      # 45-minute outer cap on tarpaulin.  Baseline is ~23 min;
      # tarpaulin also self-polices per-test at 60s, but this backstop
      # catches the case where instrumentation overhead tips a slow
      # test suite into runaway territory.
      - name: Run cargo-tarpaulin
        timeout-minutes: 45
        run: cargo tarpaulin --out Xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-wasm-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install jupyterlab

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build the Typescript project
        run: DISABLE_WASM_OPT=1 pnpm build

      - name: Run TypeScript tests
        run: pnpm test

  pysimlin:
    name: pysimlin type check and tests
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-pysimlin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-pysimlin-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build libsimlin
        run: cargo build --release --manifest-path src/libsimlin/Cargo.toml

      - name: Install pysimlin with dev dependencies
        working-directory: src/pysimlin
        run: |
          uv sync --extra dev
          uv pip install setuptools
          uv run python setup.py build_ext --inplace 2>/dev/null || true

      - name: Type check with mypy
        working-directory: src/pysimlin
        run: uv run mypy simlin/

      - name: Run tests
        working-directory: src/pysimlin
        run: uv run pytest -q --no-cov tests/

  policy:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check dependency policy
        run: python3 scripts/check-deps.py

      - name: Check documentation links
        run: python3 scripts/check-docs.py

      - name: Run project lint rules
        run: bash scripts/lint-project.sh

  serve-smoke:
    name: simlin-serve smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 15-minute cap covers macos-latest's slower binary spawn + the
    # release build itself; the actual smoke test runs in well under
    # one minute on every platform we ship.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the @simlin/serve npm matrix shipped from
        # serve-release.yml (darwin-arm64, linux-x64, win32-x64) so
        # CI proves end-to-end behaviour on every platform we publish
        # binaries for. linux-arm64 isn't a GitHub-hosted runner
        # option; we cover that target via cross-compilation and
        # rely on linux-x64 for runtime smoke coverage.
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-serve-smoke-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-serve-smoke-${{ matrix.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded SPA
        working-directory: src/simlin-serve/web
        run: pnpm build

      # SIMLIN_SERVE_BUILD_WEB=1 is set as defense-in-depth: the
      # "Build embedded SPA" step above already populates web/dist/,
      # so build.rs has nothing new to do, but the explicit env var
      # guards against a future refactor that drops the explicit
      # frontend step without noticing the embed went stale.
      - name: Build simlin-serve binary
        env:
          SIMLIN_SERVE_BUILD_WEB: "1"
        run: cargo build -p simlin-serve --release

      - name: Run smoke test
        run: cargo test -p simlin-serve --release --test smoke -- --ignored --nocapture
